<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abfahrten Meggen Lerchenbühl</title>
    <style>
        body { background: #003366; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 11px; margin: 0; overflow: hidden; }
        
        /* Left: Current Time */
        #clock { 
            position: absolute; 
            top: 11px; 
            left: 11px; 
            background: #ffffff; 
            color: #000000; 
            padding: 3px 7px; 
            font-weight: bold; 
            font-size: 14px; 
            border-radius: 4px; 
        }

        /* Right: Countdown to next bus */
        #countdown { 
            position: absolute; 
            top: 11px; 
            right: 11px; 
            background: #ffffff; 
            color: #000000; 
            padding: 3px 7px; 
            font-weight: bold; 
            font-size: 14px; 
            border-radius: 4px; 
        }

        .title { font-size: 16px; color: #fff; font-weight: bold; margin-bottom: 0px; text-align: center; letter-spacing: 0.5px; line-height: 24px; }
        .row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #dae3f2; font-size: 18px; }
        .time { color: #fff; width: 60px; font-weight: bold; }
        .delay-col { color: #ff9500; width: 45px; font-weight: bold; font-size: 18px; }
        .line { color: #fff; width: 45px; font-weight: bold; margin-bottom: 0px; margin-top: 0px; }
        .dest { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>

    <div id="countdown">--m --s</div>

    <div id="board"></div>
