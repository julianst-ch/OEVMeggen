        .row { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid #004c87; font-size: 20px; }

        .time { color: #fff; width: 60px; font-weight: bold; }

        .line { color: #fff; width: 50px; font-weight: bold; }
