<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abfahrten Meggen Lerchenbühl</title>
    <style>
        body { background: #003366; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 11px; margin: 0; overflow: hidden; }
        .title { font-size: 16px; color: #fff; font-weight: bold; margin-bottom: 0px; text-align: center; letter-spacing: 0.5px; }
        .row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #dae3f2; font-size: 18px; }
        .time { color: #fff; width: 60px; font-weight: bold; }
        .delay-col { color: #ff9500; width: 45px; font-weight: bold; font-size: 18px; }
        .line { color: #fff; width: 45px; font-weight: bold; }
        .dest { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>
    <div class="title" id="station-name">Lade Abfahrten...</div>
    <div id="board"></div>

    <script>
        const station = 'Meggen, Lerchenbühl'; 

        async function updateBoard() {
            try {
                const res = await fetch(`https://transport.opendata.ch/v1/stationboard?station=${encodeURIComponent(station)}&limit=8`);
                const data = await res.json();
                
                document.getElementById('station-name').innerText = data.station.name.toUpperCase();
                
                let html = '';
                data.stationboard.forEach(dep => {
                    // 1. Format scheduled departure time
                    const time = new Date(dep.stop.departure).toLocaleTimeString('de-CH', {hour: '2-digit', minute:'2-digit'});
                    
                    // 2. Calculate delay automatically if provided by API
                    let delayText = '';
                    let delayMins = 0;

                    if (dep.stop.delay !== undefined && dep.stop.delay !== null && dep.stop.delay > 0) {
                        delayMins = dep.stop.delay;
                    } else if (dep.stop.prognosis && dep.stop.prognosis.departure) {
                        const planned = new Date(dep.stop.departure);
                        const actual = new Date(dep.stop.prognosis.departure);
                        const diff = Math.round((actual - planned) / 60000);
                        if (diff > 0) delayMins = diff;
                    }

                    if (delayMins > 0) {
                        delayText = `+${delayMins}'`;
                    }

                    // 3. Get line name (Bus number)
                    const lineName = dep.number || dep.category; 
                    
                    // 4. Generate layout with the dedicated delay column
                    html += `
                        <div class="row">
                            <div class="time">${time}</div>
                            <div class="delay-col">${delayText}</div>
                            <div class="line">${lineName}</div>
                            <div class="dest">${dep.to}</div>
                        </div>`;
                });
                document.getElementById('board').innerHTML = html;
            } catch (e) {
                document.getElementById('board').innerHTML = '<div style="color:#ff3b30; text-align:center; font-size:18px; margin-top:20px;">Verbindung fehlgeschlagen...</div>';
            }
        }

        updateBoard();
        setInterval(updateBoard, 30000); 
    </script>
</body>
</html>
